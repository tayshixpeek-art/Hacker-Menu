<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacker OS - settings</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: 'Courier New', monospace;
            color: #00FF00;
        }

        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        .window {
            width: 80%;
            max-width: 600px;
            background: rgba(0, 20, 0, 0.95);
            border: 2px solid #00FF00;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .window h2 {
            margin: 0 0 20px 0;
            text-align: center;
            text-shadow: 0 0 10px #0F0;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #0f0;
        }

        .btn {
            background-color: #00FF00;
            color: #000;
            border: none;
            padding: 20px 60px;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 0 10px #00FF00;
            text-decoration: none;
            text-align: center;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #00FF00;
        }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

    <div class="layer">
        <div class="window">
            <h2>КОНФИГУРАЦИЯ СИСТЕМЫ</h2>
            <div class="setting-item">
                <label>ЯРКОСТЬ МАТРИЦЫ:</label>
                <input type="range" id="brightness" min="10" max="100" value="100">
            </div>
            <div class="setting-item">
                <label>СКОРОСТЬ ВЗЛОМА:</label>
                <input type="range" id="speed" min="10" max="100" value="50">
            </div>
            <div class="setting-item">
                <span>СТАТУС:</span>
                <span style="color: white;">ЗАЩИЩЕНО</span>
            </div>
            <a href="index.html" class="btn">ВЕРНУТЬСЯ</a>
        </div>
    </div>

    <script>
        // --- МАТРИЦА (ФОН) ---
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const chars = "01";
        const fontSize = 16;
        let drops = Array(Math.floor(canvas.width / fontSize)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = chars.charAt(Math.floor(Math.random() * chars.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drops = Array(Math.floor(canvas.width / fontSize)).fill(1);
        });
    </script>
</body>
</html>
